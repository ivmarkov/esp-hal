[build]
# Build on host
#target = "x86_64-unknown-linux-gnu"
# Build on target firmware with ESP IDF
#target = "xtensa-esp32s3-espidf"
# Build on target firmware with baremetal
target = "xtensa-esp32s3-none-elf"

[target.'cfg(target_os = "espidf")']
linker = "ldproxy"
runner = "espflash flash --monitor"
rustflags = [ "--cfg",  "espidf_time64"]

[target.'cfg(all(target_arch = "riscv32", target_os = "none"))']
runner = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Tlinkall.x", "-C", "force-frame-pointers"]

[target.'cfg(all(target_arch = "xtensa", target_os = "none"))']
runner  = "espflash flash --monitor"
rustflags = ["-C", "link-arg=-Wl,-Tlinkall.x", "-C", "link-arg=-nostartfiles"]

[unstable]
# For host builds and STD targets
#build-std = ["std", "panic_abort"]
# For baremetal builds
build-std = ["core", "alloc", "panic_abort"]

[env]
# Settings for ESP-IDF
MCU="esp32s3"
ESP_IDF_VERSION = "v5.1.3"
